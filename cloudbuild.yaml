steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/routing-engine', './routing-engine']
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/orchestration', './orchestration']
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/dashboard', './dashboard']
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/digital-twin', './core-digital-twin']

  # Push all images
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/routing-engine']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/orchestration']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/dashboard']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/digital-twin']

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - routing-engine
      - --image=gcr.io/$PROJECT_ID/routing-engine
      - --platform=managed
      - --region=europe-west1
      - --allow-unauthenticated
      - --port=3000
      - --set-env-vars=RUST_LOG=routing_engine=info

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dashboard
      - --image=gcr.io/$PROJECT_ID/dashboard
      - --platform=managed
      - --region=europe-west1
      - --allow-unauthenticated
      - --port=8000
      - --set-env-vars=TIMESCALE_DSN=$$TIMESCALE_DSN,ROUTING_ENGINE_URL=$$ROUTING_ENGINE_URL
    secretEnv:
      - TIMESCALE_DSN
      - ROUTING_ENGINE_URL

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - digital-twin
      - --image=gcr.io/$PROJECT_ID/digital-twin
      - --platform=managed
      - --region=europe-west1
      - --allow-unauthenticated
      - --port=80

images:
  - gcr.io/$PROJECT_ID/routing-engine
  - gcr.io/$PROJECT_ID/orchestration
  - gcr.io/$PROJECT_ID/dashboard
  - gcr.io/$PROJECT_ID/digital-twin

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/TIMESCALE_DSN/versions/latest
      env: TIMESCALE_DSN
    - versionName: projects/$PROJECT_ID/secrets/ROUTING_ENGINE_URL/versions/latest
      env: ROUTING_ENGINE_URL
    - versionName: projects/$PROJECT_ID/secrets/PINECONE_API_KEY/versions/latest
      env: PINECONE_API_KEY
